<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<div id="hearts"></div>
<div id="confetti"></div>

<!-- Welcome -->

<section id="page1" class="page active">

<div class="card">

<h1>Hey Beautiful ❤️</h1>

<p>
Today isn't just another day.<br>
It's the day my favourite person came into this world.
</p>

<button id="startBtn">
Open Your Surprise 💝
</button>

</div>

</section>

<!-- Heart Game -->

<section id="page2" class="page">

<div class="card">

<h1>Catch My Heart ❤️</h1>

<p>Click the heart 5 times.</p>

<h3 id="score">
Caught : 0 / 5
</h3>

<div id="heart">
❤️
</div>

</div>

</section>

<!-- Gift -->

<section id="page3" class="page">

<div class="card">

<h1>A Gift For You 🎁</h1>

<p>Tap the Gift</p>

<div id="gift">
🎁
</div>

</div>

</section>

<!-- Cake -->

<section id="page4" class="page">

<div class="card">

<h1>Make A Wish 🎂</h1>

<div id="cake">

<div id="flame"></div>

<div class="cake-body"></div>

</div>

<button id="blowBtn">
Blow Candle 🕯
</button>

</div>

</section>

<!-- Final -->

<section id="page5" class="page">

<div class="card">

<h1>Happy Birthday My Love ❤️</h1>

<p id="letter"></p>

<div class="gallery">

<img src="https://i.postimg.cc/hPnc1NTb/Whats-App-Image-2026-07-09-at-8-02-55-PM.jpg">

</div>

<button id="restart">
Replay ❤️
</button>

</div>

</section>

</body>
</html>
