<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
display:flex;
justify-content:center;
align-items:center;
}

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transform:scale(.95);
transition:.5s;
}

.page.active{
opacity:1;
visibility:visible;
transform:scale(1);
}

.card{
position:relative;
width:90%;
max-width:600px;
padding:40px;
background:rgba(255,255,255,.45);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 15px 40px rgba(255,105,180,.25);
text-align:center;
}

h1{
font-family:'Pacifico',cursive;
font-size:2.7rem;
color:#ff3d81;
margin-bottom:20px;
}

p{
color:#555;
font-size:18px;
margin-bottom:20px;
line-height:1.6;
}

button{
padding:15px 35px;
border:none;
border-radius:35px;
background:#ff4f92;
color:white;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff2f73;
}

.heart-card{
height:500px;
overflow:hidden;
}

#heart{
position:absolute;
left:100px;
top:180px;
font-size:70px;
cursor:pointer;
user-select:none;
transition:left .35s ease,top .35s ease,transform .2s ease;
animation:beat 1s infinite;
}

#gift{
font-size:100px;
cursor:pointer;
transition:.3s;
}

#gift:hover{
transform:scale(1.15) rotate(10deg);
}

#cake{
width:170px;
height:140px;
margin:20px auto;
position:relative;
}

.cake-body{
position:absolute;
bottom:0;
width:170px;
height:90px;
background:#ff5d96;
border-radius:20px;
}

#flame{
position:absolute;
left:76px;
top:-15px;
width:18px;
height:28px;
background:gold;
border-radius:50%;
box-shadow:0 0 20px orange;
animation:flicker .2s infinite alternate;
}

.photo{
width:220px;
height:300px;
object-fit:cover;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

#bg-hearts,
#confetti{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.floating-heart{
position:absolute;
font-size:20px;
animation:float 8s linear forwards;
opacity:.7;
}

.confetti{
position:absolute;
width:10px;
height:15px;
animation:fall 3s linear forwards;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

@keyframes flicker{
from{transform:scale(.9);}
to{transform:scale(1.1);}
}

@keyframes float{
0%{transform:translateY(110vh);}
100%{transform:translateY(-100px);}
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

@media(max-width:768px){

.card{
padding:25px;
}

h1{
font-size:2rem;
}

#heart{
font-size:60px;
}

.photo{
width:180px;
height:250px;
}

}
</style>

</head>

<body>

<div id="bg-hearts"></div>
<div id="confetti"></div>

<!-- Welcome Page -->

<section id="page1" class="page active">

<div class="card">

<h1>Hey Beautiful ❤️</h1>

<p>
I have something special for you...
</p>

<button id="startBtn">
Open Your Surprise 💝
</button>

</div>

</section>

<!-- Heart Game -->

<section id="page2" class="page">

<div class="card heart-card">

<h1>Catch My Heart ❤️</h1>

<p>Catch it 5 times to unlock your surprise.</p>

<h3 id="score">
0 / 5
</h3>

<div id="heart">
❤️
</div>

</div>

</section>

<!-- Gift -->

<section id="page3" class="page">

<div class="card">

<h1>A Gift For You 🎁</h1>

<p>Tap the gift.</p>

<div id="gift">
🎁
</div>

</div>

</section>
<!-- Cake -->

<section id="page4" class="page">

<div class="card">

<h1>Make A Wish 🎂</h1>

<div id="cake">

<div id="flame"></div>

<div class="cake-body"></div>

</div>

<button id="blowBtn">
Blow Candle 🕯
</button>

</div>

</section>

<!-- Final Page -->

<section id="page5" class="page">

<div class="card">

<h1>Happy Birthday My Dear BFF ❤️</h1>

<p id="letter"></p>

<img
class="photo"
src="https://i.postimg.cc/hPnc1NTb/Whats-App-Image-2026-07-09-at-8-02-55-PM.jpg"
alt="Love">

<br><br>

<button id="restart">
Replay ❤️
</button>

</div>

</section>

<script>
// ===================== PAGES =====================

const pages = document.querySelectorAll(".page");

function showPage(index){
    pages.forEach(page=>page.classList.remove("active"));
    pages[index].classList.add("active");
}

// ===================== ELEMENTS =====================

const startBtn=document.getElementById("startBtn");
const heart=document.getElementById("heart");
const score=document.getElementById("score");
const gift=document.getElementById("gift");
const blowBtn=document.getElementById("blowBtn");
const flame=document.getElementById("flame");
const restart=document.getElementById("restart");
const letter=document.getElementById("letter");

// ===================== START =====================

startBtn.addEventListener("click",()=>{

    showPage(1);

});

// ===================== HEART GAME =====================

let caught=0;

heart.addEventListener("click",()=>{

    caught++;

    score.textContent=`${caught} / 5`;

    if(caught<5){

        moveHeart();

    }else{

        setTimeout(()=>{

            showPage(2);

        },500);

    }

});

function moveHeart(){

    const box=document.querySelector(".heart-card");

    const maxX=box.clientWidth-100;
    const maxY=box.clientHeight-170;

    const x=Math.random()*maxX;
    const y=Math.random()*maxY+100;

    heart.style.left=x+"px";
    heart.style.top=y+"px";

    heart.style.transform="scale(1.2)";

    setTimeout(()=>{

        heart.style.transform="scale(1)";

    },150);

}
// ===================== GIFT =====================

gift.addEventListener("click",()=>{

    gift.style.transform="scale(1.2) rotate(15deg)";

    createConfetti();

    setTimeout(()=>{
        showPage(3);
    },800);

});

// ===================== CAKE =====================

blowBtn.addEventListener("click",()=>{

    flame.style.display="none";

    createConfetti();

    setTimeout(()=>{
        showPage(4);
        typeWriter();
    },1000);

});

// ===================== LETTER =====================

const text=`Happy Birthday My Dear BFF ❤️

Every moment with you is special.

Thank you for always being there.

I promise to be with you forever.

❤️`;

function typeWriter(){

    letter.innerHTML="";

    let i=0;

    const timer=setInterval(()=>{

        letter.innerHTML+=text.charAt(i);

        i++;

        if(i>=text.length){
            clearInterval(timer);
        }

    },40);

}

// ===================== FLOATING HEARTS =====================

setInterval(()=>{

    const area=document.getElementById("bg-hearts");

    const h=document.createElement("div");

    h.className="floating-heart";

    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"vw";

    h.style.fontSize=(Math.random()*15+15)+"px";

    h.style.animationDuration=(Math.random()*4+5)+"s";

    area.appendChild(h);

    setTimeout(()=>{
        h.remove();
    },9000);

},500);

// ===================== CONFETTI =====================

function createConfetti(){

    const area=document.getElementById("confetti");

    for(let i=0;i<120;i++){

        const c=document.createElement("div");

        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        c.style.background=`hsl(${Math.random()*360},90%,60%)`;

        c.style.animationDuration=(Math.random()*2+2)+"s";

        area.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },4000);

    }

}

// ===================== REPLAY =====================

restart.addEventListener("click",()=>{

    location.reload();

});
</script>

</body>
</html>
